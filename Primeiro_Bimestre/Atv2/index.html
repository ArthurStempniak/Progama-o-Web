<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

<form>

    <fieldset><legend>Crie sua conta</legend>

        <label for="nome">Nome</label>
        <input type="text" id="nome" required>

        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="nome@gmail.com" required>

        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Que não seja 123" required>

        <label><strong>Gênero</strong></label><br>

        <input type="radio" name="genero" id="masc" required>
        <label for="masc">Masculino</label>

        <input type="radio" name="genero" id="fem" required>
        <label for="fem">Feminino</label>

        <input type="radio" name="genero" id="outro" required>
        <label for="outro">Outro</label>

        <label>Biografia</label>
        <textarea placeholder="Ex... Subi num pé de perâ pra pegar uma perâ a perâ tava podre eu desci com uma goiaba" rows="5" required></textarea>

        <label><strong>Termos De Uso</strong></label>
        <input type="checkbox" required> 
        <label>Eu finjo que li e aceito os termos de serviço</label>

        <button>Enviar Formulário</button>

    </fieldset>

</form>

</body>

</html>
